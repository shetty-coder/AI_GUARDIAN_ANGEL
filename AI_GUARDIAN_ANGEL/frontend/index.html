<!DOCTYPE html>
<html>
<head>
    <title>AI Guardian Angel - Voice Companion</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>   
    <style>

body {
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    padding:20px;
    text-align:center;
    color:white;
}

/* Title */
h1 {
    color:#ffffff;
    margin-bottom:20px;
}

/* FORM CARD */
form {
    background: rgba(255,255,255,0.95);
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    display:inline-block;
    margin-bottom:30px;
    color:#2c3e50;
}

/* INPUT BOX */
input {
    padding:10px;
    width:70px;
    margin:8px;
    border-radius:8px;
    border:1px solid #ccc;
    text-align:center;
}

/* BUTTON */
button {
    padding:12px 25px;
    background:linear-gradient(45deg,#27ae60,#2ecc71);
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover {
    transform:scale(1.05);
    background:linear-gradient(45deg,#2ecc71,#27ae60);
}

/* TABLE */
table {
    width:90%;
    margin:auto;
    border-collapse: collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    color:#2c3e50;
}

/* TABLE HEADER */
th {
    background:linear-gradient(90deg,#1f4037,#99f2c8);
    color:white;
    padding:14px;
}

/* TABLE ROW */
td {
    padding:12px;
    border-bottom:1px solid #ddd;
}

/* PROGRESS BAR */
.progress-container {
    width:100%;
    background:#ddd;
    border-radius:20px;
    height:22px;
}

.progress-bar {
    height:100%;
    border-radius:20px;
    color:white;
    font-weight:bold;
    line-height:22px;
}

/* CHART CARD */
#chart-container {
    width:80%;
    margin:30px auto;
    background: rgba(255,255,255,0.95);
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    color:#2c3e50;
}

</style>     
           

       
</head>
<body>

<h1>AI Guardian Angel - Voice Companion</h1>

<form id="form">
    Sleep Hours: <input type="number" id="sleep" required>
    Steps: <input type="number" id="steps" required>
    Voice: <input type="number" id="voice" required>
    Meal Taken (1/0): <input type="number" id="meal" min="0" max="1" required>
    <button type="submit">Predict</button>
</form>

<table id="dashboard">
    <thead>
        <tr>
            <th>Sleep</th>
            <th>Steps</th>
            <th>Voice</th>
            <th>Meal</th>
            <th>Score</th>
            <th>Suggestion</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<div id="chart-container">
    <canvas id="scoreChart"></canvas>
</div>

<script>
let chartLabels = [];
let chartData = [];
const ctx = document.getElementById('scoreChart').getContext('2d');

const scoreChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: chartLabels,
        datasets: [{
            label: 'Independence Score',
            data: chartData,
            fill: true,
            backgroundColor: 'rgba(106,90,205,0.2)',
            borderColor: '#6a5acd',
            tension: 0.3
        }]
    },
    options: { 
        responsive: true, 
        scales: { y: { min: 0, max: 100 } } 
    }
}
);

function speakText(text) {
    if ('speechSynthesis' in window) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 1;
        window.speechSynthesis.speak(msg);
    }
}

document.getElementById("form").onsubmit = async function(e) {
    e.preventDefault();

    let data = {
        sleep: parseInt(document.getElementById("sleep").value),
        steps: parseInt(document.getElementById("steps").value),
        voice: parseInt(document.getElementById("voice").value),
        meal: parseInt(document.getElementById("meal").value)
    };

    try {
        let response = await fetch("http://127.0.0.1:5000/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        let result = await response.json();
        if (result.independence_score < 50){
    speakText("Emergency alert! Caregiver assistance required immediately.");
}

        // Add row to table
        let tbody = document.querySelector("#dashboard tbody");
        let emoji = result.independence_score > 85 ? "😊" : result.independence_score > 65 ? "😐" : "⚠️";
        let row = document.createElement("tr");
        row.innerHTML = `
            <td>${data.sleep}</td>
            <td>${data.steps}</td>
            <td>${data.voice}</td>
            <td>${data.meal}</td>
            <td>
                <div class="progress-container">
                    <div class="progress-bar" style="width:${result.independence_score}%; background-color:${result.independence_score>85?'#6a5acd':result.independence_score>65?'#f1c40f':'#e74c3c'};">
                        ${result.independence_score}%
                    </div>
                </div>
                <div class="emoji">${emoji}</div>
            </td>
            <td>${result.suggestion}</td>
        `;
        tbody.appendChild(row);

        // Update chart
        chartLabels.push(chartLabels.length + 1);
        chartData.push(result.independence_score);
        scoreChart.update();

        // Voice companion
        if (result.independence_score < 65) {
            speakText("Alert! Low independence detected. " + result.suggestion);
        } else if (result.independence_score < 85) {
            speakText("Keep going! " + result.suggestion);
        } else {
            speakText("Great job! Your independence score is excellent. " + result.suggestion);
        }

    } catch (error) {
        alert("Error connecting to backend. Make sure backend is running.");
        console.error(error);
    }
};
</script>

</body>
</html>
